<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5a7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9a77c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f3a;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central sun circle with radiating elegant rays -->
  <g transform="translate(200,200)" filter="url(#softGlow)">
    <!-- Outer sun rays - slender elongated triangles -->
    <g opacity="0.8">
      <polygon points="0,-180 6,-90 0,-100 -6,-90" fill="url(#goldGradient)"/>
      <polygon points="0,180 6,90 0,100 -6,90" fill="url(#goldGradient)"/>
      <polygon points="-180,0 -90,6 -100,0 -90,-6" fill="url(#goldGradient)"/>
      <polygon points="180,0 90,6 100,0 90,-6" fill="url(#goldGradient)"/>
      <!-- Diagonal rays -->
      <polygon points="-128,-128 -64,-64 -72,-72 -64,-80" fill="url(#goldGradient)" transform="rotate(45)"/>
      <polygon points="128,128 64,64 72,72 64,80" fill="url(#goldGradient)" transform="rotate(45)"/>
      <polygon points="-128,128 -64,64 -72,72 -64,80" fill="url(#goldGradient)" transform="rotate(-45)"/>
      <polygon points="128,-128 64,-64 72,-72 64,-80" fill="url(#goldGradient)" transform="rotate(-45)"/>
    </g>

    <!-- Middle ring of rays -->
    <g opacity="0.6">
      <polygon points="0,-140 4,-70 0,-80 -4,-70" fill="url(#goldGradient)"/>
      <polygon points="0,140 4,70 0,80 -4,70" fill="url(#goldGradient)"/>
      <polygon points="-140,0 -70,4 -80,0 -70,-4" fill="url(#goldGradient)"/>
      <polygon points="140,0 70,4 80,0 70,-4" fill="url(#goldGradient)"/>
      <polygon points="-99,-99 -50,-50 -56,-56 -50,-62" fill="url(#goldGradient)" transform="rotate(45)"/>
      <polygon points="99,99 50,50 56,56 50,62" fill="url(#goldGradient)" transform="rotate(45)"/>
      <polygon points="-99,99 -50,50 -56,56 -50,62" fill="url(#goldGradient)" transform="rotate(-45)"/>
      <polygon points="99,-99 50,-50 56,-56 50,-62" fill="url(#goldGradient)" transform="rotate(-45)"/>
    </g>

    <!-- Inner sun corona -->
    <circle cx="0" cy="0" r="55" fill="url(#goldGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="48" fill="#0f0f0f"/>

    <!-- Elegant S letter for Sein Helios -->
    <text x="0" y="8" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="48" font-weight="600" fill="url(#goldGradient)" text-anchor="middle">S</text>
  </g>

  <!-- Optional: outer decorative ring -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3"/>
</svg>
